# Fila de Aprendizado Autônomo
# OpenClaw lê este arquivo quando recebe um novo tópico para estudar

version: 2.0
created: 2026-03-10
updated: 2026-03-10
status: active

# ========================================
# FLUXO DE TRABALHO
# ========================================
#
# 1. NOVO TÓPICO (quando você der)
#    └── status: "new"
#    └── AÇÃO: Fazer levantamento bibliográfico COMPLETO
#    └── Criar topics/[topico]/bibliography.md
#    └── Mudar status para "reading"
#
# 2. LEITURA
#    └── status: "reading"
#    └── AÇÃO: Ler próxima fonte da bibliografia
#    └── Resumir em topics/[topico]/sources/XXX-[fonte].md
#    └── Atualizar progress.json
#
# 3. CONCLUÍDO
#    └── status: "completed"
#    └── Sintetizar em topics/[topico]/synthesis.md
#    └── Atualizar heuristics.md
#
# ========================================

config:
  session_study_time: 30m
  daily_cron: "0 */4 * * *"
  sources_per_session: 3
  search_depth: 10

# ========================================
# FILA DE TÓPICOS - VAZIA
# ========================================
# Adicione tópicos aqui quando quiser que eu estude
# 
# Formato:
# - id: "identificador-unico"
#   name: "Nome do Tópico"
#   priority: 1  # 1=alta, 2=média, 3=baixa
#   status: "new"
#   progress:
#     bibliography_complete: false
#     sources_total: null
#     sources_read: 0
#     concepts_learned: []
#   notes: "Descrição opcional"

topics: []

# ========================================
# HEURÍSTICAS APRENDIDAS
# ========================================
heuristics:
  - topic: "general"
    rules:
      - "Sempre fazer levantamento bibliográfico ANTES de ler"
      - "Priorizar documentação oficial quando disponível"
      - "Papers de survey são bons pontos de partida"
      - "Livros didáticos para fundamentação teórica"
      - "Tutoriais e exemplos para aplicação prática"

# ========================================
# PADRÕES IDENTIFICADOS
# ========================================
patterns: []

# ========================================
# SÍNTESES CRIADAS
# ========================================
syntheses: []