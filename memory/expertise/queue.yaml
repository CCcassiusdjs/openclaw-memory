status: active

# ========================================
# FLUXO DE TRABALHO
# ========================================
#
# 1. NOVO TÓPICO (quando você der)
#    └── status: "new"
#    └── AÇÃO: Fazer levantamento bibliográfico COMPLETO
#    └── Criar topics/[topico]/bibliography.md
#    └── Mudar status para "reading"
#
# 2. LEITURA
#    └── status: "reading"
#    └── AÇÃO: Ler próxima fonte da bibliografia
#    └── Resumir em topics/[topico]/sources/XXX-[fonte].md
#    └── Atualizar progress.json
#
# 3. CONCLUÍDO
#    └── status: "completed"
#    └── Sintetizar em topics/[topico]/synthesis.md
#    └── Atualizar heuristics.md
#
# ========================================

config:
  session_study_time: 30m
  daily_cron: "0 */4 * * *"
  sources_per_session: 3
  search_depth: 10

