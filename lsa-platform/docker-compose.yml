version: "3.8"

services:
  # Frontend (Static files served by Nginx)
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cluster-network
    deploy:
      placement:
        constraints:
          - node.role == manager
    ports:
      - "8082:80"

  # Backend API (FastAPI)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: lsa-platform-api:2.0.0
    networks:
      - cluster-network
    environment:
      - DATABASE_URL=postgresql://ardupilot:ardupilot123@10.10.20.13/platform
      - REDIS_URL=redis://10.10.20.11:6379
      - MQTT_BROKER=10.10.20.11
      - MQTT_PORT=1883
      - JETSON_DOOR_URL=http://192.168.2.117:5000
      - JETSON_ADMIN_USER=celebro
      - JETSON_ADMIN_PASS=l@bls@25
      - JWT_SECRET=lsa-lab-secret-2026
      - T620_HOST=10.10.20.11
      - T630A_HOST=10.10.20.12
      - T630B_HOST=10.10.20.13
      - CLUSTER_USER=cassiusdjs
      - CLUSTER_PASS=230612
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.lsa-api.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.lsa-api.entrypoints=web"
        - "traefik.http.services.lsa-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"

networks:
  cluster-network:
    external: true