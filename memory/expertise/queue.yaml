# ========================================
# HEURÍSTICAS APRENDIDAS
# ========================================
heuristics:
  - topic: "general"
    rules:
      - "Sempre fazer levantamento bibliográfico ANTES de ler"
      - "Priorizar documentação oficial quando disponível"
      - "Papers de survey são bons pontos de partida"
      - "Livros didáticos para fundamentação teórica"
      - "Tutoriais e exemplos para aplicação prática"
  - topic: "kubernetes"
    rules:
      - "Docs oficiais K8s são referência primária"
      - "Práticas de security sempre primeiro"
      - "MLOps é área em rápida evolução - buscar fontes recentes (2024-2025)"
      - "GPU Management requer conhecimento de NVIDIA ecosystem"
      - "Kubeflow é plataforma padrão para ML em K8s"

# ========================================
# PADRÕES IDENTIFICADOS
# ========================================
patterns:
  - pattern: "CRD Pattern"
    topic: "kubernetes"
    description: "Custom Resource Definitions permitem estender K8s para workloads específicos (PyTorchJob, TFJob, InferenceService)"
  - pattern: "Operator Pattern"
    topic: "kubernetes"
    description: "Controllers observam CRDs e mantêm desired state - usado em GPU Operator, Training Operator, KServe"
  - pattern: "Device Plugin Pattern"
    topic: "kubernetes"
    description: "Plugins expor dispositivos especiais (GPUs) como resources - NVIDIA Device Plugin é padrão"

